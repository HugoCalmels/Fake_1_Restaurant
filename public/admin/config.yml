backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  # =========================
  # PAGES
  # =========================
  - name: "pages"
    label: "Pages"
    files:
      - name: "hero"
        label: "Hero"
        file: "content/hero.json"
        format: "json"
        fields:
          - { label: "Kicker", name: "kicker", widget: "string", required: false }
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Sous-titre", name: "subtitle", widget: "string", required: false }
          - { label: "CTA principal (label)", name: "primaryCtaLabel", widget: "string" }
          - { label: "CTA principal (href)", name: "primaryCtaHref", widget: "string" }
          - { label: "CTA secondaire (label)", name: "secondaryCtaLabel", widget: "string", required: false }
          - { label: "CTA secondaire (href)", name: "secondaryCtaHref", widget: "string", required: false }
          - { label: "Note", name: "note", widget: "string", required: false }
          - { label: "Image de fond", name: "bgImage", widget: "image", required: false }
          - { label: "Alt image", name: "bgAlt", widget: "string", required: false }

  # =========================
  # MENUS
  # =========================
  - name: "menus"
    label: "Cartes & Menus"
    files:
      - name: "menu_midi"
        label: "Carte Midi"
        file: "content/menu-midi.json"
        format: "json"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Intro", name: "intro", widget: "text" }

          - label: "Formules"
            name: "formules"
            widget: "list"
            summary: "{{fields.label}} — {{fields.price}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Prix", name: "price", widget: "string" }

          - label: "Sections"
            name: "sections"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Sous-titre", name: "sub", widget: "string", required: false }

              - label: "Items"
                name: "items"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - { label: "Nom", name: "name", widget: "string" }
                  - { label: "Description", name: "desc", widget: "string", required: false }

              - { label: "Note de bas", name: "note", widget: "text", required: false }

      - name: "menu_soir_weekend"
        label: "Carte Soir & week-end"
        file: "content/menu-soir-weekend.json"
        format: "json"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Intro", name: "intro", widget: "text" }

          - label: "Formules"
            name: "formules"
            widget: "list"
            summary: "{{fields.label}} — {{fields.price}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Prix", name: "price", widget: "string" }

          - label: "Sections"
            name: "sections"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Sous-titre", name: "sub", widget: "string", required: false }

              - label: "Items"
                name: "items"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - { label: "Nom", name: "name", widget: "string" }
                  - { label: "Description", name: "desc", widget: "string", required: false }

              - { label: "Note de bas", name: "note", widget: "text", required: false }

  # =========================
  # PHOTOS (UI PRO avec vignettes)
  # =========================
  - name: "photos"
    label: "Photos"
    files:
      - name: "gallery"
        label: "Galerie"
        file: "content/photos.json"
        format: "json"
        fields:
          - label: "Photos"
            name: "photos"
            widget: "list"
            summary: "{{fields.alt}}"
            fields:
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Alt", name: "alt", widget: "string" }