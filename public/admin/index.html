<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin</title>
  </head>
  <body>
    <!-- Identity widget (obligatoire) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <!-- Decap -->
    <script defer src="https://unpkg.com/decap-cms@3.10.0/dist/decap-cms.js"></script>

    <!-- Conventionnel: si token dans l'URL, on ouvre identity + redirect admin -->
    <script>
      window.addEventListener("load", () => {
        if (!window.netlifyIdentity) return;

        const hash = window.location.hash || "";
        const hasToken =
          hash.includes("invite_token=") ||
          hash.includes("recovery_token=") ||
          hash.includes("confirmation_token=");

        // Ouvre le widget si on arrive depuis un lien email
        if (hasToken) window.netlifyIdentity.open();

        // Après login -> on reste dans /admin (on nettoie juste l'URL)
        window.netlifyIdentity.on("login", () => {
          window.location.href = "/admin/";
        });
      });
    </script>
  </body>
</html>
